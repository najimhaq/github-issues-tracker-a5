<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker | Login</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="assets/Aperture.png" type="image/x-icon" />

    <!-- tailwind+daisy  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Remix Icon -->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen bg-base-200 flex items-center justify-center">
    <div class="shadow-lg rounded-xl p-8 w-full max-w-md bg-white">
      <!-- Logo Section -->
      <div class="flex flex-col items-center space-y-6">
        <img
          src="assets/github-logo.png"
          alt="logo"
          title="GitHub Issues Tracker"
          class="w-20 h-20"
        />
        <div class="text-center">
          <h2 class="text-2xl font-semibold text-gray-800">
            GitHub Issues Tracker
          </h2>
          <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
        </div>
      </div>

      <!-- Form Section -->
      <form class="mt-8 space-y-6">
        <!-- Username -->
        <div>
          <label class="block text-gray-700 text-lg font-medium mb-2"
            >Username</label
          >
          <input
            type="text"
            class="input input-bordered w-full"
            placeholder="Enter Username"
            value="admin"
            id="input-userName"
            required
          />
          <p class="text-blue-600 text-sm mt-1">Default: admin</p>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-gray-700 text-lg font-medium mb-2"
            >Password</label
          >
          <input
            type="password"
            class="input input-bordered w-full"
            placeholder="Password"
            value="admin123"
            id="input-pass"
            required
          />
          <p class="text-blue-600 text-sm mt-1">Default: admin123</p>
        </div>

        <!-- Submit Button -->
        <button
          class="btn btn-primary w-full mt-4 bg-[#4A00FF] hover:bg-[#3a00cc] border-0"
          type="submit"
          id="signIn-btn"
        >
          Sign In
        </button>
      </form>
      <!-- OR -->
      <div class="mt-5 flex items-center gap-3">
        <div class="grow border-t border-gray-300"></div>
        <span class="text-gray-500 font-medium">OR</span>
        <div class="grow border-t border-gray-300"></div>
      </div>
      <div class="mt-6 flex flex-col items-center">
        <p class="text-[#64748B] font-normal text-[14px] mb-6">Demo Credentials:</p>
        <div class="text-center">
          <p class="text-[#1F2937] text-lg"><strong>Username:</strong> admin</p>
          <p class="text-[#1F2937] text-lg"><strong>Password:</strong> admin123</p>
        </div>
      </div>
    </div>

    <script src="script/login.js"></script>
  </body>
</html>
