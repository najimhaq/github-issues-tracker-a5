<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Issues Page | Home</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="assets/Aperture.png" type="image/x-icon" />

    <!-- tailwind+daisy  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Remix Icon -->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="mb-5">
      <div
        class="navbar flex flex-wrap justify-between items-center bg-base-100 shadow-sm px-4 md:px-12 min-h-16"
      >
        <!-- Left: Logo -->
        <div class="flex items-center gap-3 shrink-0">
          <img class="w-10 h-10" src="./assets/github-logo.png" alt="logo" />
          <a
            class="btn btn-ghost normal-case text-xl md:text-2xl text-gray-800 no-animation"
          >
            GitHub Issues Tracker
          </a>
        </div>

        <!-- RIght -->
        <div class="flex items-center gap-3 hidden md:flex">
          <!-- Search -->
          <label
            class="input input-bordered flex items-center gap-2 grow max-w-xs"
          >
            <i class="ri-search-line text-[#64748]"></i>
            <input
              id="search-input"
              type="search"
              required
              placeholder="Search"
              class="grow"
            />
          </label>
          <!-- New Issue -->
          <button class="btn btn-primary gap-2">
            <i class="ri-add-line"></i> New Issue
          </button>
          <!-- LogOut -->
          <a id="logOut" href="/login.html" class="btn btn-error gap-2 text-white">
            <i class="ri-logout-box-line"></i> Log Out
          </a>
        </div>

        <!-- Mobile Menu Button -->
        <div class="dropdown dropdown-end md:hidden shrink-0">
          <label tabindex="0" class="btn btn-ghost btn-circle">
            <i class="ri-menu-line text-xl"></i>
          </label>
          <ul
            tabindex="0"
            class="menu menu-sm dropdown-content mt-3 z-1 p-2 shadow bg-base-100 rounded-box w-52"
          >
            <li>
              <label class="input input-bordered flex items-center gap-2">
                <i class="ri-search-line"></i>
                <input
                  type="search"
                  required
                  placeholder="Search"
                  class="grow"
                />
              </label>
            </li>
            <li>
              <a class="justify-start gap-2 text-sm"
                ><i class="ri-add-line"></i> New Issue</a
              >
            </li>
            <li>
              <a
                href="/login.html"
                class="justify-start gap-2 text-error text-sm font-bold"
                ><i class="ri-logout-box-line"></i> Log Out</a
              >
            </li>
          </ul>
        </div>
      </div>
    </header>
    <main>
      <!-- Button Section -->
      <section class="px-4 md:px-12 py-6 mb-4">
        <div
          id="btn-group"
          class="w-full md:w-9/12 mx-auto flex flex-wrap justify-start md:justify-start gap-2 rounded-xl shadow p-4 md:p-6"
        >
          <button
            id="select-all"
            class="btn btn-primary min-w-[100px] md:min-w-32 flex-1 md:flex-none"
          >
            All
          </button>
          <button
            id="select-open"
            class="btn btn-outline min-w-[100px] md:min-w-32 flex-1 md:flex-none"
          >
            Open
          </button>
          <button
            id="select-close"
            class="btn btn-outline min-w-[100px] md:min-w-32 flex-1 md:flex-none"
          >
            Close
          </button>
        </div>
      </section>
      <!-- 50 Issues Section -->
      <section class="px-4 md:px-12 py-6">
        <div
          id="issues-text"
          class="w-full md:w-9/12 mx-auto flex flex-wrap justify-between md:justify-between gap-3 rounded-xl shadow p-4 md:p-6"
        >
          <!-- Left -->
          <div class="flex gap-3 justify-center items-center">
            <img src="./assets/Aperture.png" alt="icon" />
            <div>
              <h2 id="total-count" class="text-xl font-semibold text-[#1F2937]">
                0 Issues
              </h2>
              <p class="text-lg font-normal text-[#64748B]">
                Track and manage your project issues
              </p>
            </div>
          </div>

          <!-- Right -->
          <div class="flex gap-5">
            <p class="font-medium text-lg">
              <i class="ri-circle-fill mr-1 text-[#00A96E]"></i>
              Open <span id="open-count">0</span>
            </p>

            <p class="font-medium text-lg">
              <i class="ri-circle-fill mr-1 text-[#A855F7]"></i>
              Close <span id="close-count">0</span>
            </p>
          </div>
        </div>
      </section>
      <!-- Data Section Api -->
      <section class="px-4 md:px-12 mb-8">
        <div
          id="data-card-all"
          class="w-full md:w-9/12 mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-6"
        ></div>
      </section>
      <!-- modal -->
      <section>
        <dialog id="issueModal" class="modal">
          <div class="modal-box max-w-3xl p-8">
            <!-- Title -->
            <h2 id="modal-title" class="text-3xl font-bold mb-3"></h2>

            <!-- Status + Author + Date -->
            <div class="flex items-center gap-3 text-sm text-gray-500 mb-5">
              <span id="modal-status" class="badge badge-success">Opened</span>
              <span>•</span>
              <span id="modal-author" class="text-[#64748B]"></span>
              <span>•</span>
              <span id="modal-date"></span>
            </div>

            <!-- Labels -->
            <div id="modal-labels" class="flex gap-3 mb-6"></div>

            <!-- Description -->
            <p id="modal-description" class="text-gray-500 text-lg mb-6"></p>

            <!-- Assignee + Priority -->
            <div class="bg-base-200 rounded-xl p-6 flex justify-between">
              <div>
                <p class="text-gray-500 mb-1">Assignee:</p>
                <p id="modal-assignee" class="font-semibold text-xl"></p>
              </div>

              <div>
                <p class="text-gray-500 mb-1">Priority:</p>
                <span
                  id="modal-priority"
                  class="badge badge-error px-4 py-3"
                ></span>
              </div>
            </div>

            <!-- Close Button -->
            <div class="modal-action mt-6">
              <form method="dialog">
                <button class="btn btn-primary">Close</button>
              </form>
            </div>
          </div>
        </dialog>
      </section>
    </main>

    <script src="script/dashboard.js"></script>
  </body>
</html>
